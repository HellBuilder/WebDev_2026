@if (true) {
  <div class="modal-backdrop" (click)="onBackdropClick()">
    <div class="modal-content" (click)="$event.stopPropagation()">

      <button class="close-btn" (click)="OnClose()">✕</button>

      <div class="modal-body">
        <div class="modal-image">
          <img style = "width:400px" src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8c21hcnQlMjBwaG9uZXxlbnwwfHwwfHx8MA%3D%3D">
        </div>

        <div class="modal-details">
          <h3> Smartphone </h3>
        </div>
      </div>

    </div>
  </div>
}
