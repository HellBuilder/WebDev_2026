<nav class="categories">
<div *ngIf="!selectedCategoryId" class="hint">
  Please select a category
</div>

<div class="products">
  <div class="product-card" *ngFor="let product">

    <h3>{{ product.name }}</h3>
    <p>{{ product.description }}</p>

    <p><strong>Price:</strong> {{ product.price }} KZT</p>
    <p><strong>Rating:</strong> {{ product.rating }}</p>

    <a href="" target="_blank">Open on Kaspi</a>

  </div>
</div>
